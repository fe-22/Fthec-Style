services:
  - type: web
    name: pristilo-vitrine
    runtime: python
    plan: starter
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    disk:
      name: uploads
      mountPath: /opt/render/project/src/backend/frontend/uploads
      sizeGB: 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.5
      - key: DATABASE_URL
        fromDatabase:
          name: pristilo-db
          property: connectionString
      - key: SEED_DEMO_DATA
        value: false
      - key: CONSULTANT_WHATSAPP_NUMBER
        value: "5511997727075"
      - key: PUBLIC_STORE_URL
        fromService:
          name: pristilo-vitrine
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: UPLOAD_ROOT
        value: /opt/render/project/src/backend/frontend/uploads
      - key: ENABLE_OLLAMA
        value: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_SESSION_SECRET
        generateValue: true

databases:
  - name: pristilo-db
    plan: free
    databaseName: pristilo
    user: pristilo
